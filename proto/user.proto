syntax = "proto3";
option go_package = "./pb;pb";
package user;

message UserLoginQuery{
  string code = 1;
}

message UserLoginQueryResponse{
  string token  = 1;
  UserInfo user = 2;
}

message WxLoginPayload{
  string session_key = 1;
  string unionid = 2;
  string openid = 3;
  int32 errcode = 4;
  string errmsg  = 5;
}


message UserInfo{
  int64 id = 1;
  string nickname = 2;
  string avatar = 3;
}